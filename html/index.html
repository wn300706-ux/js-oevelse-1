<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>objekt</title>
  </head>

  <body>
    <h1>Personer</h1>
    <main>
      <section id="personliste"></section>
    </main>

    <script>
      const personer = [
        {
          name: "Lebron James",
          cpr: "2808961234",
          email: "lebronja@gmail.com",
          city: "Los Angeles",
          team: "LA LAKERS",
          children: [],
        },

        {
          name: "Stephen Curry",
          cpr: "2808961234",
          email: "lebronja@gmail.com",
          city: "Bay Area",
          team: "GOLDEN STATE",
          children: [1],
        },
        {
          name: "Michael Jordan",
          cpr: "2808961234",
          email: "lebronja@gmail.com",
          city: "Chicago",
          team: "CHICAGO BULLS",
          children: [2],
        },
      ];
      const personliste = document.querySelector("#personliste");

      function showPersoner() {
        personer.forEach((person) => {
          personliste.innerHTML += `
        <article class="personkort">
            <h2>${person.name}</h2>
            <p>CPR: ${person.cpr}</p>
            <p>${person.email}</p>
            <p>${person.team}</p>
            <p>Children:${person.children.join(", ")}</p>
            </article>
            `;
        });
      }

      showPersoner();
    </script>
  </body>
</html>
